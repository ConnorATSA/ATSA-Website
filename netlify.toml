# ATSA website — Netlify config.
# Netlify runs the build (precompiles JSX, production React) and publishes dist/.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Hash-based SPA routing: every path resolves to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache the content-stable assets.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
